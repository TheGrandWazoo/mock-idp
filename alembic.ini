# Alembic configuration for the mock-idp Postgres backend.
# DSN is read from MOCK_IDP_PG_DSN at runtime — do not put credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Logging — leave at WARN to avoid polluting test output.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
