name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  IMAGE: ghcr.io/thegrandwazoo/mock-idp
  OWNER: thegrandwazoo
  PACKAGE: mock-idp

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest tests -v
        env:
          CONFIG_PATH: config.example.yaml
          ISS_BASE: http://localhost:8080

      - name: Lint Helm chart
        run: helm lint chart/

      - name: Check chart appVersion matches pyproject.toml
        run: |
          APP_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          CHART_VER=$(python3 -c "import yaml; print(yaml.safe_load(open('chart/Chart.yaml'))['appVersion'])")
          if [ "$APP_VER" != "$CHART_VER" ]; then
            echo "ERROR: chart appVersion ($CHART_VER) does not match pyproject.toml ($APP_VER)"
            echo "Update chart/Chart.yaml appVersion to $APP_VER"
            exit 1
          fi
          echo "chart appVersion $CHART_VER matches pyproject.toml"

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: write       # create/delete releases and git tags
      packages: write       # push and delete GHCR images
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: ver
        run: |
          V=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          S="${GITHUB_SHA:0:7}"
          echo "version=$V"            >> "$GITHUB_OUTPUT"
          echo "short_sha=$S"          >> "$GITHUB_OUTPUT"
          echo "sha_tag=${V}-sha-${S}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # pre-release tags (v1.2.3-alpha, -beta, -rc): version tag only, no latest
            type=match,pattern=v(\d+\.\d+\.\d+-.+),group=1,enable=${{ contains(github.ref, '-') }}
            # stable release tags: version tag + latest
            type=match,pattern=v(\d+\.\d+\.\d+$),group=1
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: mock-idp:smoke
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test
        run: |
          docker run -d --name mock-idp-smoke \
            -p 8080:8080 \
            -e CONFIG_PATH=/etc/mock-idp/config.yaml \
            -e ISS_BASE=http://localhost:8080 \
            -v "$(pwd)/config.example.yaml:/etc/mock-idp/config.yaml:ro" \
            mock-idp:smoke

          printf 'Waiting for /healthz'
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then echo ' ok'; break; fi
            printf '.'
            sleep 1
            [ "$i" -eq 30 ] && { echo; echo "ERROR: healthz timed out"; docker logs mock-idp-smoke; exit 1; }
          done

          echo "Testing password grant..."
          TOKEN=$(curl -sf -X POST http://localhost:8080/smoke/token \
            -d 'grant_type=password&username=alice&password=alice-pw&resource=api://serviceB' \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          [ -n "$TOKEN" ] \
            || { echo "ERROR: password grant returned no token"; docker logs mock-idp-smoke; exit 1; }

          echo "Testing client_credentials grant..."
          TOKEN=$(curl -sf -X POST http://localhost:8080/smoke/token \
            -d 'grant_type=client_credentials&client_id=01010101-1010-1010-1010-aaaaaaaaaaaa&client_secret=serviceA-secret&resource=api://serviceB' \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          [ -n "$TOKEN" ] \
            || { echo "ERROR: client_credentials grant returned no token"; docker logs mock-idp-smoke; exit 1; }

          echo "All smoke tests passed."
          docker stop mock-idp-smoke && docker rm mock-idp-smoke

      - name: Scan with Trivy (SARIF)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mock-idp:smoke
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        if: github.event_name != 'pull_request' && always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on HIGH/CRITICAL vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mock-idp:smoke
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # ── sha build (push to main) ────────────────────────────────────────

      - name: Push sha image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          TAG="${{ steps.ver.outputs.sha_tag }}"
          docker tag mock-idp:smoke "${{ env.IMAGE }}:${TAG}"
          docker push "${{ env.IMAGE }}:${TAG}"

      - name: Create sha draft release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          SHA_TAG="${{ steps.ver.outputs.sha_tag }}"
          gh release create "v${SHA_TAG}" \
            --title "v${SHA_TAG}" \
            --draft \
            --target "$GITHUB_SHA" \
            --notes "Development build toward v${V}. Image: \`${{ env.IMAGE }}:${SHA_TAG}\`"

      - name: Clean up previous sha drafts and images
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ env.OWNER }}
          PACKAGE: ${{ env.PACKAGE }}
        run: |
          bash .github/scripts/cleanup-sha-artifacts.sh \
            "${{ steps.ver.outputs.version }}" \
            "${{ steps.ver.outputs.sha_tag }}"

      # ── release tag (v*) ───────────────────────────────────────────────

      - name: Push release image
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag mock-idp:smoke "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Clean up sha drafts and images for this version
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ env.OWNER }}
          PACKAGE: ${{ env.PACKAGE }}
        run: |
          bash .github/scripts/cleanup-sha-artifacts.sh \
            "${{ steps.ver.outputs.version }}"

      - name: Create release draft
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          REF_TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$REF_TAG" \
            --title "$REF_TAG" \
            --draft \
            --notes "Release $REF_TAG. Image: \`${{ env.IMAGE }}:${V}\`"
