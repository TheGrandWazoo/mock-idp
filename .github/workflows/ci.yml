name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  IMAGE: ghcr.io/thegrandwazoo/mock-idp

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest tests -v
        env:
          CONFIG_PATH: config.example.yaml
          ISS_BASE: http://localhost:8080

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # PRs: no tag (build only)
            # main branch: sha-<hash>
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            # pre-release tags (alpha/beta/rc): version tag only, no latest
            type=match,pattern=v(\d+\.\d+\.\d+-.+),group=1
            # release tags: version tag + latest
            type=match,pattern=v(\d+\.\d+\.\d+$),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: mock-idp:smoke
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test
        run: |
          docker run -d --name mock-idp-smoke \
            -p 8080:8080 \
            -e CONFIG_PATH=/etc/mock-idp/config.yaml \
            -e ISS_BASE=http://localhost:8080 \
            -v "$(pwd)/config.example.yaml:/etc/mock-idp/config.yaml:ro" \
            mock-idp:smoke

          printf 'Waiting for /healthz'
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null; then echo ' ok'; break; fi
            printf '.'
            sleep 1
            [ "$i" -eq 30 ] && { echo; echo "ERROR: healthz timed out"; docker logs mock-idp-smoke; exit 1; }
          done

          echo "Testing password grant..."
          TOKEN=$(curl -sf -X POST http://localhost:8080/smoke/token \
            -d 'grant_type=password&username=alice&password=alice-pw&resource=api://serviceB' \
            | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] \
            || { echo "ERROR: password grant returned no token"; docker logs mock-idp-smoke; exit 1; }

          echo "Testing client_credentials grant..."
          TOKEN=$(curl -sf -X POST http://localhost:8080/smoke/token \
            -d 'grant_type=client_credentials&client_id=01010101-1010-1010-1010-aaaaaaaaaaaa&client_secret=serviceA-secret&resource=api://serviceB' \
            | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] \
            || { echo "ERROR: client_credentials grant returned no token"; docker logs mock-idp-smoke; exit 1; }

          echo "All smoke tests passed."
          docker stop mock-idp-smoke && docker rm mock-idp-smoke

      - name: Scan with Trivy (SARIF)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mock-idp:smoke
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        if: github.event_name != 'pull_request' && always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on HIGH/CRITICAL vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mock-idp:smoke
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag mock-idp:smoke "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
