---
# Generate with: openssl rand -hex 32
# kubectl create secret generic mock-idp-admin-token \
#   --namespace mock-idp \
#   --from-literal=admin-token=<your-token>
apiVersion: v1
kind: Secret
metadata:
  name: mock-idp-admin-token
  namespace: mock-idp
stringData:
  admin-token: change-me-in-real-deployments
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-idp-config
  namespace: mock-idp
data:
  config.yaml: |
    auth_mode: lax
    cors_allow_origins: ["*"]
    users:
      alice:
        password: alice-pw
        upn: alice@example.com
        preferred_username: alice@example.com
        oid: 11111111-1111-1111-1111-aaaaaaaaaaaa
        tid: 22222222-2222-2222-2222-222222222222
        token_version: v2
        token_lifetime_seconds: 300
        roles: [operator, responder]
        groups: [platform-team]
        allowed_audiences: [api://serviceB, api://serviceC]
        extra_claims:
          department: engineering
      bob:
        password: bob-pw
        upn: bob@example.com
        preferred_username: bob@example.com
        oid: 11111111-1111-1111-1111-bbbbbbbbbbbb
        token_version: v2
        token_lifetime_seconds: 300
        roles: [metrics-reader]
        groups: [analytics-team]
        allowed_audiences: [api://serviceB]
    clients:
      service-a:
        client_id: 01010101-1010-1010-1010-aaaaaaaaaaaa
        secret: serviceA-secret
        label: ServiceA
        token_version: v1
        roles: [m2m]
        groups: [service-accounts]
        allowed_audiences: [api://serviceB]
      service-b:
        client_id: 02020202-2020-2020-2020-bbbbbbbbbbbb
        secret: serviceB-secret
        label: ServiceB
        token_version: v1
        roles: [m2m]
        groups: [service-accounts]
        allowed_audiences: [api://serviceC]
      "00000000-0000-0000-0000-000000000000":
        secret: admin-secret
        label: TestAdmin
        override_any_claim: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-idp
  namespace: mock-idp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-idp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-idp
        app.kubernetes.io/component: idp-mock
    spec:
      containers:
        - name: mock-idp
          image: ghcr.io/thegrandwazoo/mock-idp:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CONFIG_PATH
              value: /etc/mock-idp/config.yaml
            - name: ISS_BASE
              value: https://mock-idp.example.com
            - name: MOCK_IDP_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mock-idp-admin-token
                  key: admin-token
          volumeMounts:
            - name: config
              mountPath: /etc/mock-idp
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: mock-idp-config
---
apiVersion: v1
kind: Service
metadata:
  name: mock-idp
  namespace: mock-idp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mock-idp
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mock-idp
  namespace: mock-idp
spec:
  ingressClassName: nginx
  tls:
    - secretName: kong-wildcard-cert
      hosts:
        - mock-idp.example.com
  rules:
    - host: mock-idp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mock-idp
                port:
                  name: http
