# -- Number of replicas. Keep at 1 — signing key is in-memory per pod.
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/thegrandwazoo/mock-idp
  # -- Image tag. Defaults to `Chart.appVersion` when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- External base URL advertised in tokens and OIDC discovery.
# Defaults to the in-cluster Service DNS: `http://<fullname>.<namespace>.svc.cluster.local:8080`.
issBase: ""

service:
  # -- Service type.
  type: ClusterIP
  # -- Service port.
  port: 8080

ingress:
  # -- Enable the Ingress resource.
  enabled: true
  # -- Ingress class name (e.g. `nginx`, `cilium`).
  className: nginx
  # -- Hostname for the Ingress rule and TLS certificate.
  host: mock-idp.example.com
  tls:
    # -- Enable TLS on the Ingress.
    enabled: true
    # -- Name of the TLS Secret.
    secretName: kong-wildcard-cert

# -- Resource requests and limits for the mock-idp container.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Identity store loaded at startup. Serialized as-is into the mounted `config.yaml`.
# Swap users/clients per environment; do not store real secrets here — use a values override file.
config:
  auth_mode: lax
  cors_allow_origins:
    - "*"
  admin_token: change-me-in-real-deployments
  users:
    alice:
      password: alice-pw
      upn: alice@example.com
      preferred_username: alice@example.com
      oid: 11111111-1111-1111-1111-aaaaaaaaaaaa
      token_version: v2
      token_lifetime_seconds: 300
      roles: [technician, noc]
      groups: [support-engineers]
      allowed_audiences: [api://serviceB, api://serviceC]
      extra_claims:
        department: engineering
  clients:
    service-a:
      client_id: 01010101-1010-1010-1010-aaaaaaaaaaaa
      secret: serviceA-secret
      label: ServiceA
      token_version: v1
      roles: [automation]
      groups: [api-callers]
      allowed_audiences: [api://serviceB]
    "00000000-0000-0000-0000-000000000000":
      secret: admin-secret
      label: TestAdmin
      override_any_claim: true
